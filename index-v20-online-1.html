class Unit {
    constructor(id, team, base, extra) {
        this.id = id;
        this.team = team;
        this.base = base;
        this.extra = extra;
        
        // [Balance] 체력 설정 - 상수 사용
        this.maxHp = GAME_CONSTANTS.BASE_HP;
        
        // 가시(Tree-Dark)는 탱커형 딜러라 더 높게 유지
        if (base === 'Tree' && extra === 'Dark') {
            this.maxHp = GAME_CONSTANTS.TREE_DARK_HP;
        }
        // 푸른불(Fire-Light)은 서브 탱커라 약간 높게 유지
        else if (base === 'Fire' && extra === 'Light') {
            this.maxHp = GAME_CONSTANTS.FIRE_LIGHT_HP;
        }
        // [Balance] 불(Fire) 기본 체력 너프 (유리대포화)
        else if (base === 'Fire' && !extra) {
            this.maxHp = GAME_CONSTANTS.FIRE_HP;
        }
        
        this.hp = this.maxHp;
        this.evadeTriggered = false;
        this.revengeAtk = 0;
        this.shield = (base === 'Metal' && !extra) ? GAME_CONSTANTS.METAL_BASE_SHIELD : 0;

        if (this.team === 1 && typeof Game !== 'undefined' && (Game.difficulty === 'hell' || Game.difficulty === 'hard')) {
            this.atk = 70;
        } else {
            this.atk = 55 + (id * 7 % 15);
        }

        this.status = [];
        this.isDead = false;
        this.thornStack = 0;
        this.linkedAllyId = -1;
        this.s2Count = 0;
        this.elecStacks = 0;
        this.growthStack = 0;
        this.treeStack = 0; // [Tree] 패시브 스택 (0~2)
        this.resist = 0;
        this.stats = {
            dmg: 0,
            heal: 0,
            shieldGiven: 0,
            taken: 0,
            kills: 0
        };
        this.isSuper = false;
        this.passiveTriggered = false;
        this.metalPassiveUsed = false;
        this.isNormal = this.base === 'Normal' || (this.base === 'Light' && this.extra === 'Dark') || (this.base === 'Dark' && this.extra === 'Light');
        this.isEnhanced = (this.base === this.extra && (this.base === 'Light' || this.base === 'Dark'));

        if (this.isNormal) this.name = NAME_MAP['Normal'];
        else if (this.isEnhanced) this.name = NAME_MAP[`${this.base}-${this.extra}`];
        else if (this.extra) this.name = `${NAME_MAP[`${this.base}-${this.extra}`]} (${ATTR[this.base].n}+${ATTR[this.extra].n})`;
        else this.name = `${ATTR[this.base].n} (기초)`;
    }
    getKey() {
        if (this.isNormal) return 'Normal';
        if (this.isEnhanced) return `${this.base}-${this.extra}`;
        return SKILL_DB[`${this.base}-${this.extra}`] ? `${this.base}-${this.extra}` : this.base;
    }

    checkAwakening() {
        // [신규] 튜토리얼 모드에서는 각성 발동 금지 (도감 오염 방지)
        if (typeof Game !== 'undefined' && Game.difficulty === 'tutorial') return;

        if (this.isSuper) return;
        
        // [Balance] 쉴드 최대량 제한
        if (this.shield > GAME_CONSTANTS.MAX_SHIELD) {
            this.shield = GAME_CONSTANTS.MAX_SHIELD;
        }

        const key = this.getKey();
        const role = SKILL_DB[key]?.role;
        if (!role) return;
        
        let awakened = false;
        
        if (role === 'nuker') {
            awakened = this.stats.kills >= GAME_CONSTANTS.AWAKENING.NUKER_KILLS || 
                      this.stats.dmg >= GAME_CONSTANTS.AWAKENING.NUKER_DMG;
        } else if (role === 'tank') {
            awakened = this.stats.taken >= GAME_CONSTANTS.AWAKENING.TANK_TAKEN;
        } else if (role === 'supp') {
            awakened = (this.stats.heal + this.stats.shieldGiven) >= GAME_CONSTANTS.AWAKENING.SUPP_HEAL_SHIELD;
        }
        
        if (awakened) {
            this.isSuper = true;
            
            // [Modified] Emotion Awakening Logic
            const emo = EMOTION_DB[key];
            if (emo) {
                const isNew = TitleManager.unlock(key);
                const titleText = `[${emo.t}] Awakened!`;
                UI.floatText(this, titleText, "ft-crit");
                
                if (isNew) {
                    setTimeout(() => {
                        Game.log(`<span class="log-crit" style="color:#d500f9;">🏆 New Title Unlocked: [${emo.t}]</span>`);
                        // 알림 메시지는 한 번만
                        const bubble = document.createElement('div');
                        bubble.style.cssText = "position:fixed; top:20%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.8); color:#fff; padding:15px 25px; border-radius:30px; z-index:9999; font-size:18px; box-shadow:0 5px 15px rgba(0,0,0,0.3); animation:floatUp 2s forwards;";
                        bubble.innerHTML = `💎 New Emotion: <b>${emo.t}</b><br><span style='font-size:12px; color:#aaa;'>${emo.d}</span>`;
                        document.body.appendChild(bubble);
                        setTimeout(() => bubble.remove(), 2500);
                    }, 500);
                }
            } else {
                UI.floatText(this, "⚡각성!!⚡", "ft-crit");
            }

            AudioSys.play('AWAKEN');
            Game.render();
        }
    }

    getAtk() {
        let v = this.atk;
        
        // [Fire 패시브] 불의 기세: 라운드별 공격력 증가
        if (this.base === 'Fire' && !this.extra) {
            const r = (typeof Game !== 'undefined' && Game.globalRound) ? Game.globalRound : 1;
            
            if (r <= 2) v += 15;      // 1~2라운드 (초반)
            else if (r <= 6) v += 10; // 3~6라운드 (중반)
            else v += 5;              // 7라운드 이후 (후반)
        }
        
        // [Tree-Dark 패시브] 복수
        if (this.revengeAtk > 0) v += this.revengeAtk;
        
        // [Light 패시브] 빛의 힘
        const lightMight = this.status.find(s => s.type === 'LIGHT_MIGHT');
        if (lightMight) {
            v += (lightMight.val || 1) <= 1 ? 15 : 20;
        }
        
        // 기타 버프
        if (this.hasStatus('ATK_BUFF_SMALL')) v += 10;
        // [Fix #1] DMG_UP_10은 실제 데미지 계산(applyDamage)에서만 적용
        // getAtk()에 포함 시 카드 표시 공격력이 75→69로 오르내려 버그처럼 보임
        
        // 최소값 적용
        v = Math.max(GAME_CONSTANTS.MIN_ATK, v);
        
        // 공격력 감소 디버프 적용
        const atkDownDebuffs = this.status.filter(s => 
            s.type === 'ATK_DOWN' || s.type === 'ATK_DOWN_FEAR'
        );
        
        if (atkDownDebuffs.length > 0) {
            atkDownDebuffs.forEach(debuff => {
                if (debuff.val > 0) {
                    v -= Math.floor(v * (debuff.val / 100));
                } else {
                    v -= 15; // 기본값
                }
            });
        }
        
        return Math.max(0, v);
    }

    resetTurn() {
        this.passiveTriggered = false;
        this.metalPassiveUsed = false;
    }

    takeDamage(dmg, isFire = false, ignoreShield = false, source = null) {
        // [Tree 패시브] 거목: 기본 15% 뎀감 + 스택당 5% (최대 25%)
        if (this.base === 'Tree' && !this.extra) {
            const reducePct = 0.15 + (this.treeStack * 0.05);
            dmg = Math.floor(dmg * (1.0 - reducePct));
        }

        // [화상 버프] 불 속성 공격이 화상 상태 적에게 25% 추가 피해
        if (isFire && this.hasStatus('BURN')) {
            dmg = Math.floor(dmg * GAME_CONSTANTS.DAMAGE_MULTIPLIER.BURN_BOOST);
        }

        // [Metal 패시브] 강철 의지: 최대 체력 20% 이상 피해 방어
        if (this.base === 'Metal' && !this.extra && this.shield > 0) {
            const cap = Math.floor(this.maxHp * 0.20);
            if (dmg > cap) {
                dmg = cap;
                UI.floatText(this, "강철의지!", "ft-heal");
            }
        }

        // 데미지 감소 버프 적용
        if (this.hasStatus('DMG_RED')) {
            dmg = Math.floor(dmg * 0.8);
        }
        
        // 회피 체크
        if (this.hasStatus('EVADE')) {
            if (Game.netRandom() < GAME_CONSTANTS.EVADE_CHANCE) {
                UI.floatText(this, "회피!", "ft-miss");
                this.status = this.status.filter(s => s.type !== 'EVADE');
                return -1;
            }
        }
        
        // [Dark 패시브] 업보: 피해 반사
        if (source && source.id !== this.id && !source.isDead) {
            const karma = source.status.find(s => s.type === `KARMA_VICTIM_${this.id}`);
            const isDarkVsDark = (this.base === 'Dark' && source.base === 'Dark');
            
            if (karma && !isDarkVsDark) {
                const reflectDmg = Math.floor(dmg * GAME_CONSTANTS.KARMA_REFLECT_RATE);
                if (reflectDmg > 0) {
                    const actualReflect = source.takeDamage(reflectDmg, false, true, null);
                    this.stats.dmg += actualReflect;
                    UI.floatText(source, reflectDmg, "ft-crit");
                }
            }
        }

        this.stats.taken += dmg;
        let hpDmg = 0;
        let shieldDmg = 0;
        if (!ignoreShield && this.shield > 0) {
            if (this.shield >= dmg) {
                shieldDmg = dmg;
                this.shield -= dmg;
                hpDmg = 0;
            } else {
                shieldDmg = this.shield;
                hpDmg = dmg - this.shield;
                this.shield = 0;
            }
        } else {
            hpDmg = dmg;
        }
        if (hpDmg > 0 && this.hasStatus('EARTH_RECOIL')) {
            hpDmg += 15;
            this.stats.taken += 15;
            UI.floatText(this, "Crack(+15)", "ft-crit");
        }
        this.hp = Math.max(0, this.hp - hpDmg);

        if (this.hp <= 0 && source) {
            source.stats.kills = (source.stats.kills || 0) + 1;
            if (source.isSuper && !source.isDead) {
                const allies = source.team === 0 ? Game.pTeam : Game.eTeam;
                const aliveAllies = allies.filter(a => !a.isDead);
                if (aliveAllies.length === 1 && aliveAllies[0].id === source.id) {
                    UI.showCutIn(source);
                }
            }
            if (source.checkAwakening) source.checkAwakening();
        }

        if (this.base === 'Water' && this.extra === 'Light' && this.hp > 0 && this.hp <= this.maxHp * 0.2 && !this.evadeTriggered) {
            const healAmt = Math.floor(this.maxHp * 0.1);
            this.hp += healAmt;
            this.addStatus('EVADE', 2);
            this.evadeTriggered = true;
            UI.floatText(this, `기화! (+${healAmt})`, "ft-heal");
        }

        this.checkAwakening();

        // [Fix] HP가 0 이하면 즉시 사망 처리 (반사 데미지 좀비화 방지)
        if (this.hp <= 0 && !this.isDead) {
            if (typeof Game !== 'undefined' && Game.die) {
                Game.die(this);
            }
        }
        
        // [개선] 카드 흔들림 효과 적용 (도트 데미지 제외)
        if (source && hpDmg > 0 && typeof UI !== 'undefined' && UI.shakeCard) {
            UI.shakeCard(this, hpDmg + shieldDmg);
        }

        // [레이드] 보스 피격 패시브 발동
        if (this.isBoss && hpDmg > 0 && this.hp > 0 && typeof BossRaidDB !== 'undefined') {
            const bossData = BossRaidDB[this.bossId];
            if (bossData && this.bossId === 0) {
                // 염류의 수호자: 피격 시 40% 확률 자가 힐 40
                if (Math.random() < 0.40) {
                    const healAmt = 40;
                    this.hp = Math.min(this.maxHp, this.hp + healAmt);
                    if (typeof UI !== 'undefined') UI.floatText(this, `+${healAmt}💚`, 'ft-heal');
                }
            }
        }

        return hpDmg + shieldDmg;
    }

    addStatus(type, turn, val = 0, source = null, force = false) {
        const CC_LIST = ['STUN', 'FREEZE', 'BANISH', 'SILENCE', 'SLEEP'];
        
        // 1. 선공 방어막 체크
        if (this.hasStatus('START_IMMUNITY') && !force) {
            if (CC_LIST.includes(type) || type.startsWith('PROVOKED')) { 
                UI.floatText(this, "🛡️CC 방어!", "ft-miss");
                return;
            }
        }

        // 2. 업보(Karma) 반사 체크
        if (source && source.id !== this.id && !force) {
            const karma = source.status.find(s => s.type === `KARMA_VICTIM_${this.id}`);
            const isDarkVsDark = (this.base === 'Dark' && source.base === 'Dark');
            const isPuppet = (this.hasStatus('MC_READY') || (Game.isMindControlling && Game.isMindControlling.id === this.id));
            
            if (karma && !isDarkVsDark && !isPuppet) {
                if (Game.netRandom() < GAME_CONSTANTS.KARMA_REFLECT_CHANCE) {
                    UI.floatText(this, "반사!", "ft-crit");
                    Game.log(`<span class='log-crit'>👁️ [${this.name}]의 업보 발동! [${source.name}]에게 ${type} 반사</span>`);
                    source.addStatus(type, turn, val, null, true);
                    return;
                }
            }
        }

        // 3. 노말 면역 체크
        const NORMAL_IMMUNE = ['FREEZE', 'STUN', 'BANISH', 'SILENCE'];
        if (this.isNormal && !force && NORMAL_IMMUNE.includes(type)) {
            UI.floatText(this, "면역!", "ft-miss");
            return;
        }

        // 🔥 4. 중첩 가능 상태이상(공격/치유 감소) 최우선 처리
        // [수정] ATK_DOWN_FEAR는 중첩 불가능하므로 제외
        if (type === 'ATK_DOWN' || type === 'HEAL_DOWN') {
            const s = this.status.filter(s => s.type === type);
            if (s.length < 2) {
                this.status.push({ type, turn, val, sourceId: source ? source.id : -1 });
            } else {
                const shortest = s.sort((a, b) => a.turn - b.turn)[0];
                shortest.turn = turn;
                shortest.val = val; 
                if (source) shortest.sourceId = source.id;
            }
            return;
        }

        // 5. 그 외 일반 상태이상 (중복 시 덮어쓰기/갱신)
        const existing = this.status.find(s => s.type === type);
        if (existing && !force) {
            if (turn > existing.turn) {
                existing.turn = turn;
                existing.val = val;
                existing.sourceId = source?.id;
            }
            return;
        }
        
        // 6. 상호 배타적 상태이상 제거
        const MUTUALLY_EXCLUSIVE = {
            'STUN': ['FREEZE', 'BANISH', 'SLEEP'],
            'FREEZE': ['STUN', 'BANISH', 'SLEEP'],
            'BANISH': ['STUN', 'FREEZE', 'SLEEP'],
            'SLEEP': ['STUN', 'FREEZE', 'BANISH']
        };
        
        if (MUTUALLY_EXCLUSIVE[type]) {
            const removed = [];
            MUTUALLY_EXCLUSIVE[type].forEach(conflictType => {
                const conflict = this.status.find(s => s.type === conflictType);
                if (conflict) {
                    removed.push(conflictType);
                    this.status = this.status.filter(s => s.type !== conflictType);
                }
            });
            if (removed.length > 0) {
                Game.log(`<span class='log-sys'>[${this.name}] ${removed.join(', ')} 상태가 ${type}으로 대체됨</span>`);
            }
        }
        
        // 7. 회피 체크
        if (this.hasStatus('EVADE') && ['STUN', 'FREEZE'].includes(type) && !force) {
            if (source && source.id !== this.id) {
                if (Game.netRandom() < GAME_CONSTANTS.EVADE_CHANCE) {
                    UI.floatText(this, "회피!", "ft-miss");
                    this.status = this.status.filter(s => s.type !== 'EVADE');
                    return;
                }
            }
        }

        // 8. 도발 및 기타 면역
        if (this.isNormal && !force && type.startsWith('PROVOKED')) {
            UI.floatText(this, "면역!", "ft-miss");
            return;
        }
        const HARD_CC = ['STUN', 'FREEZE', 'BANISH', 'SLEEP'];
     if (HARD_CC.includes(type)) {
         if (this.hasStatus('IMMUNITY') && !force) {
             UI.floatText(this, "면역", "ft-miss");
             return;
         }

         // [신규] 시전자가 행동 불가(CC) 상태가 되면 정신 지배 즉시 해제
         if (typeof Game !== 'undefined' && Game.currentMCCasterId === this.id) {
              // 현재 조종 중인 대상 찾기
              const puppet = Game.isMindControlling || [...Game.pTeam, ...Game.eTeam].find(u => u.hasStatus('MC_WAIT') && u.status.find(s=>s.type==='MC_WAIT').sourceId === this.id);

              if (puppet) {
                  Game.log(`<span class='log-sys'>💫 시전자([${this.name}])가 무력화되어 정신 지배가 풀렸습니다!</span>`);
                  UI.floatText(this, "정신붕괴", "ft-crit");

                  // 세뇌 관련 상태(대기/준비) 모두 제거
                  puppet.status = puppet.status.filter(s => s.type !== 'MC_READY' && s.type !== 'MC_WAIT');

                  // 전역 변수 초기화 (현재 조종 중이었다면 제어권 반환)
                  if (Game.isMindControlling && Game.isMindControlling.id === puppet.id) {
                      Game.isMindControlling = null;
                      Game.currentMCCasterId = null;

                      // UI 복구 (테두리 색상 초기화)
                      const cp = document.querySelector('.control-panel');
                      if(cp) cp.style.borderTop = "5px solid #ccc"; 
                  }
              }
         }

         if (!source || source.id !== this.id || force) {
             this.status.push({
                 type: 'IMMUNITY',
                 turn: turn + 1
             });
         }
     }
        if (this.resist > 0 && Game.netRandom() < this.resist && ['POISON', 'BURN', 'FREEZE', 'STUN', 'SILENCE', 'BLIND', 'TRAP', 'BANISH', 'ATK_DOWN', 'ATK_DOWN_FEAR', 'HEAL_DOWN'].includes(type)) return;
        
        // 9. 최종 등록
        this.status.push({
            type,
            turn,
            val,
            sourceId: source ? source.id : -1
        });
    }
    hasStatus(type) {
        return this.status.some(s => s.type === type);
    }
    cleanse() {
        // [수정] ATK_DOWN_FEAR는 정화 불가능
        const bad = ['POISON', 'BURN', 'FREEZE', 'STUN', 'SILENCE', 'BLIND', 'TRAP', 'BANISH', 'ATK_DOWN', 'KARMA_VICTIM'];
        this.status = this.status.filter(s => !bad.includes(s.type) && !s.type.startsWith('PROVOKED') && !s.type.startsWith('KARMA_VICTIM'));
    }
    dispel() {
        const buffs = ['EVADE', 'DMG_RED', 'ATK_BUFF', 'GROWTH', 'LIGHT_MIGHT'];
        const has = this.status.some(s => buffs.includes(s.type));
        this.status = this.status.filter(s => !buffs.includes(s.type));
        return has;
    }

    tickStatus() {
        let log = [];
        const allUnits = [...Game.pTeam, ...Game.eTeam];
        const findSource = (id) => allUnits.find(u => u.id === id) || null;

        // 1. 독 (Poison)
        const poison = this.status.find(s => s.type === 'POISON');
        if (poison) {
            const src = findSource(poison.sourceId);
            const d = this.takeDamage(GAME_CONSTANTS.DOT_DAMAGE.POISON, false, false, src);
            if (src) Game.recordStat(src, 'dmg', d);
            UI.floatText(this, d, 'ft-dmg');
            log.push(`☠️ [${this.name}] 독 피해 -${d}`);
        }

        // 2. 화상 (Burn)
        const burn = this.status.find(s => s.type === 'BURN');
        if (burn) {
            const src = findSource(burn.sourceId);
            const d = this.takeDamage(GAME_CONSTANTS.DOT_DAMAGE.BURN, false, false, src);
            if (src) Game.recordStat(src, 'dmg', d);
            UI.floatText(this, d, 'ft-dmg');
            log.push(`🔥 [${this.name}] 화상 피해 -${d}`);
        }

        // 3. 모래지옥 (Trap)
        const trap = this.status.find(s => s.type === 'TRAP');
        if (trap) {
            const src = findSource(trap.sourceId);
            const d = this.takeDamage(GAME_CONSTANTS.DOT_DAMAGE.TRAP, false, false, src);
            if (src) Game.recordStat(src, 'dmg', d);
            UI.floatText(this, d, 'ft-dmg');
            log.push(`⏳ [${this.name}] 모래지옥 -${d}`);
        }
        return log;
    }
    decayStatus() {
        this.status.forEach(s => s.turn--);
        this.status = this.status.filter(s => s.turn > 0);
    }
    heal(amount) {
        // [수정] 치유 감소 및 반동 로직 통합
        let totalReduction = 0;
        
        // 1. 기존 치유 감소(HEAL_DOWN)
        const healDebuffs = this.status.filter(s => s.type === 'HEAL_DOWN');
        if (healDebuffs.length > 0) {
            totalReduction += healDebuffs.reduce((sum, s) => sum + (s.val || 0), 0);
        }

        // 2. 반동(EARTH_RECOIL) 상태: 치유량 30% 추가 감소
        if (this.hasStatus('EARTH_RECOIL')) {
            totalReduction += 30;
            UI.floatText(this, "반동(치유↓)", "ft-miss");
        }

        // 최종 감소 적용
        if (totalReduction > 0) {
            const originalAmount = amount;
            const multiplier = Math.max(0, (100 - totalReduction) / 100);
            amount = Math.floor(amount * multiplier);

            // [디버그 로그]
            console.log(`💉 [Healing] ${this.name}: ${originalAmount} -> ${amount} (감소율: ${totalReduction}%)`);
            
            if (amount === 0 && originalAmount > 0) {
                UI.floatText(this, "치유차단", "ft-miss");
            }
        }

        const prev = this.hp;
        this.hp = Math.min(this.maxHp, this.hp + amount);
        const diff = this.hp - prev;
        if (diff > 0) {
            UI.floatText(this, diff, 'ft-heal');
        }
        this.checkAwakening();
        return diff;
    }
}

const AudioSys = {
    ctx: null,
    bgmVol: 0.5, // 배경음악 볼륨
    sfxVol: 0.5, // 효과음 볼륨
    bgmMuted: false,
    sfxMuted: false,

    init: function() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.loadSettings(); // [핵심] 저장된 설정 불러오기
        }
        if (this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    },

    resume: function() {
        this.init();
    },

    // [신규] 설정 저장 (볼륨 조절/토글 시 호출)
    saveSettings: function() {
        const data = {
            bgmVol: this.bgmVol,
            sfxVol: this.sfxVol,
            bgmMuted: this.bgmMuted,
            sfxMuted: this.sfxMuted
        };
        localStorage.setItem('et_audio_settings', JSON.stringify(data));
    },

    // [신규] 설정 불러오기 (init에서 호출)
    loadSettings: function() {
        const saved = localStorage.getItem('et_audio_settings');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                // 데이터 로드
                if(data.bgmVol !== undefined) this.bgmVol = data.bgmVol;
                if(data.sfxVol !== undefined) this.sfxVol = data.sfxVol;
                if(data.bgmMuted !== undefined) this.bgmMuted = data.bgmMuted;
                if(data.sfxMuted !== undefined) this.sfxMuted = data.sfxMuted;

                // UI(슬라이더) 강제 동기화
                setTimeout(() => {
                    const bgmSlider = document.querySelector('input[oninput*="setBgmVolume"]');
                    if(bgmSlider) bgmSlider.value = this.bgmVol * 100;

                    const sfxSlider = document.querySelector('input[oninput*="setSfxVolume"]');
                    if(sfxSlider) sfxSlider.value = this.sfxVol * 100;

                    const bgmBtn = document.getElementById('tog-bgm');
                    if(bgmBtn) {
                        if (this.bgmMuted) bgmBtn.classList.remove('on');
                        else bgmBtn.classList.add('on');
                    }

                    const sfxBtn = document.getElementById('tog-sfx');
                    if(sfxBtn) {
                        if (this.sfxMuted) sfxBtn.classList.remove('on');
                        else sfxBtn.classList.add('on');
                    }
                }, 100); // DOM 렌더링 후 적용

            } catch (e) { console.error("설정 로드 실패", e); }
        }
    },

    // [신규] BGM 볼륨 조절
    setBgmVolume: function(val) {
        this.bgmVol = val / 100;
        if (MusicEngine && MusicEngine.currentAudio) {
            MusicEngine.currentAudio.volume = this.bgmVol;
        }
        this.saveSettings(); // 변경 즉시 저장
    },

    // [신규] SFX 볼륨 조절
    setSfxVolume: function(val) {
        this.sfxVol = val / 100;
        this.saveSettings(); // 변경 즉시 저장
    },

    toggleChannel: function(type) {
        if (type === 'bgm') {
            this.bgmMuted = !this.bgmMuted;
            document.getElementById('tog-bgm').classList.toggle('on');

            if(this.bgmMuted) {
                MusicEngine.stop();
            } else {
                if (MusicEngine.currentAudio && MusicEngine.currentAudio.paused) {
                    MusicEngine.currentAudio.play();
                } else {
                    MusicEngine.play('Start'); 
                }
            }
        } else {
            this.sfxMuted = !this.sfxMuted;
            document.getElementById('tog-sfx').classList.toggle('on');
        }
        this.saveSettings(); // 상태 변경 저장
    },

    playTone: function(freq, type, duration, vol, detune = 0, isBGM = false) {
        if (!this.ctx) return;
        if (isBGM && this.bgmMuted) return;
        if (!isBGM && this.sfxMuted) return;

        const t = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();

        osc.type = type;
        osc.frequency.value = freq;
        if (detune !== 0) osc.detune.value = detune;

        // [수정] 효과음 증폭 로직 추가
        let baseVol = isBGM ? this.bgmVol : this.sfxVol;

        // ⚡ [증폭] 효과음(SFX)이라면 2.5배 더 크게 출력
        if (!isBGM) {
            baseVol *= 2.5; 
        }

        // 최종 볼륨 계산 (너무 커서 찢어지지 않게 최대 1.0으로 제한 안전장치)
        let finalVol = vol * baseVol;
        if (finalVol > 1.0) finalVol = 1.0; 

        gain.gain.setValueAtTime(0, t);
        // 타격감을 위해 0.02초만에 빠르게 최고 볼륨 도달 (기존 0.05보다 빠름)
        gain.gain.linearRampToValueAtTime(finalVol, t + 0.02); 
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);

        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.start(t);
        osc.stop(t + duration + 0.1);
    },

    play: function(type) {
        if (this.sfxMuted) return;
        this.init();
        switch (type) {
            case 'HIT': this.playTone(150, 'square', 0.1, 0.2); break;
            case 'CRITICAL': 
                this.playTone(800, 'sawtooth', 0.2, 0.3); 
                setTimeout(()=>this.playTone(1200, 'square', 0.1, 0.2), 50);
                break;
            case 'SKILL': this.playTone(400, 'sine', 0.3, 0.2); break;
            case 'HEAL': 
                this.playTone(600, 'sine', 0.15, 0.2);
                setTimeout(()=>this.playTone(800, 'sine', 0.3, 0.2), 150);
                break;
            case 'DEBUFF': this.playTone(300, 'sawtooth', 0.3, 0.15); break;
            case 'POWER_UP':
                this.playTone(300, 'square', 0.1, 0.15);
                setTimeout(()=>this.playTone(450, 'square', 0.1, 0.15), 100);
                break;
            case 'WIN': 
                [0,200,400,600].forEach((d,i)=> setTimeout(()=>this.playTone(523+(i*100),'triangle',0.3,0.3), d));
                break;
            case 'CUTIN': this.playTone(100, 'sawtooth', 0.8, 0.4); break;
            case 'AWAKEN': this.playTone(200, 'square', 0.5, 0.3); break;
        }
    },
    speak: function(unit) {
        if(this.sfxMuted) return;
        this.init();
        const base = 400 + (unit.id*50);
        for(let i=0; i<2; i++) {
            setTimeout(()=> this.playTone(base+(Math.random()*100-50), 'triangle', 0.08, 0.15), i*80);
        }
    }
};

// 🎹 Music Engine (Hybrid: MP3 File + Synth Fallback)
// ==========================================
const MusicEngine = {
    mode: 'FILE', // 'FILE'(MP3) or 'SYNTH'(전자음 안전모드)
    ctx: null, 
    isPlaying: false, 
    currentAudio: null, // HTMLAudioElement
    wasPlayingBeforeHide: false, // [Fix] 백그라운드 재생 상태 추적 변수 초기화

    // [Synth Fallback Data] 파일 로드 실패 시 사용할 캐논 데이터
    canon: {
        melody: [587, 554, 494, 440, 392, 370, 392, 440, 587, 0, 494, 0, 494, 554, 587, 659, 740, 587, 659, 587, 554, 494, 554, 440, 392, 440, 494, 554, 370, 440, 494, 554],
        bass:   [293, 0, 220, 0, 246, 0, 185, 0, 196, 0, 293, 0, 196, 0, 220, 0, 293, 220, 246, 293, 185, 246, 196, 220, 196, 220, 293, 220, 293, 370, 440, 554],
        step: 0
    },
    timeoutId: null, 
    bgmOscillators: [],

    init: () => {
        if (!MusicEngine.ctx) { MusicEngine.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        if (MusicEngine.ctx.state === 'suspended') MusicEngine.ctx.resume();
    },

    // [핵심] 재생 함수
    play: (trackName) => {
        MusicEngine.init(); 
        MusicEngine.stop(); // 기존 곡 정지
        MusicEngine.isPlaying = true;

        // [New] 엔딩 BGM 특수 처리: 성공 시에만 기존 BGM 정지 (실패 시 기존 BGM 유지)
 if (trackName === 'ending') {
     let filename = "ending.mp3";
     const newAudio = new Audio(filename);
     if (typeof AudioSys !== 'undefined') newAudio.volume = AudioSys.bgmVol;

     // 기존 곡을 끄지 않고 먼저 재생 시도
     const playPromise = newAudio.play();
     if (playPromise !== undefined) {
         playPromise.then(() => {
             console.log("🎵 Ending BGM started. Stopping previous track.");
             MusicEngine.stop(); // 재생 성공 확인 후 기존 BGM 정지

             MusicEngine.isPlaying = true;
             MusicEngine.currentAudio = newAudio;
             // 엔딩은 반복/랜덤 재생 하지 않음
         }).catch(e => {
             console.warn("⚠️ Ending BGM failed (Missing/Blocked). Keeping offline BGM.", e);
             // 실패 시 stop()을 호출하지 않으므로 기존 BGM이 계속 나옴
         });
     }
     return;
 }

 // [일반 로직] 기존 BGM 즉시 정지 후 재생
 MusicEngine.stop(); 
 MusicEngine.isPlaying = true;

 // 1. 안전 모드(Synth)
 if (MusicEngine.mode === 'SYNTH') {
     MusicEngine.canon.step = 0;
     MusicEngine.loopCanon();
     return;
 }

 // 2. MP3 파일 모드
 let filename = trackName;
 if (!filename.toLowerCase().endsWith('.mp3')) filename += ".mp3";

 MusicEngine.currentAudio = new Audio(filename);
 if (typeof AudioSys !== 'undefined') MusicEngine.currentAudio.volume = AudioSys.bgmVol;

 MusicEngine.currentAudio.onended = () => {
     MusicEngine.playRandom();
 };

 MusicEngine.currentAudio.onerror = (e) => {
     console.warn(`⚠️ [MusicEngine] Failed to load "${filename}". Switching to SYNTH mode.`);
     MusicEngine.mode = 'SYNTH'; 
     MusicEngine.currentAudio = null;
     MusicEngine.play('Canon_Piano'); 
 };

 MusicEngine.currentAudio.play().catch(e => {
     console.error("🚫 Autoplay blocked:", e);
 });
    },

    // [랜덤 재생] Start 제외한 나머지 곡 중 선택
    playRandom: () => {
        // [Update] Trip 추가
        const playlist = ['Calm', 'Groove', 'Surprise', 'Duck_step', 'Trip'];
        const nextTrack = playlist[Math.floor(Math.random() * playlist.length)];
        MusicEngine.play(nextTrack);
    },

    stop: () => {
        MusicEngine.isPlaying = false;

        // MP3 정지
        if (MusicEngine.currentAudio) {
            MusicEngine.currentAudio.pause();
            MusicEngine.currentAudio.currentTime = 0;
            MusicEngine.currentAudio = null;
        }

        // Synth 정지
        clearTimeout(MusicEngine.timeoutId);
        MusicEngine.bgmOscillators.forEach(o => { try{o.stop();}catch(e){} });
        MusicEngine.bgmOscillators = [];
    },

    // [Fallback] 기존 전자음 생성기 (유지)
    playTone: (freq, type, duration, vol) => {
        if (!MusicEngine.ctx) return;
        const t = MusicEngine.ctx.currentTime;
        const osc = MusicEngine.ctx.createOscillator();
        const gain = MusicEngine.ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;

        const master = (typeof AudioSys !== 'undefined') ? AudioSys.bgmVol : 0.5;
        const finalVol = vol * master * 0.3;

        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(finalVol, t + 0.02); 
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);

        osc.connect(gain); 
        gain.connect(MusicEngine.ctx.destination);
        osc.start(t); 
        osc.stop(t + duration + 0.1);

        MusicEngine.bgmOscillators.push(osc);
        osc.onended = () => {
            const i = MusicEngine.bgmOscillators.indexOf(osc);
            if (i > -1) MusicEngine.bgmOscillators.splice(i, 1);
        };
    },

    loopCanon: function() {
        if (!this.isPlaying) return;
        const idx = this.canon.step;
        const mNote = this.canon.melody[idx];
        const bNote = this.canon.bass[idx];

        if(mNote) {
            this.playTone(mNote, 'sine', 0.5, 0.3);
            this.playTone(mNote * 2, 'triangle', 0.2, 0.1);
        }
        if(bNote) {
            this.playTone(bNote, 'square', 0.1, 0.05);
            this.playTone(bNote, 'sine', 0.8, 0.3);
        }

        this.canon.step = (this.canon.step + 1) % this.canon.melody.length;
        this.timeoutId = setTimeout(() => this.loopCanon(), 400);
    }
};

        const rect = unitEl.getBoundingClientRect();

        // [Fix #3] 겹침 방지: 카드별 활성 텍스트 개수를 세어 Y 오프셋 누적 적용

        // [Fix] 화면 가장자리에서 텍스트가 잘리지 않도록 X 좌표 클램핑
        const rawX = rect.left + rect.width / 2 + window.scrollX + randomX;
        const margin = 60; // 화면 양쪽 최소 여백(px)
        const clampedX = Math.max(margin, Math.min(window.innerWidth - margin, rawX));
        el.dataset.card = id;
        el.style.left = clampedX + 'px';
        el.style.top  = (rect.top + window.scrollY - stackOffset) + 'px';

    // [수정] 이펙트를 화면 전체 좌표 기준으로 생성 (가려짐 방지)
    playVFX: function(unit, type) {

    if (!el) return;

    }

    // [신규] CSS 기반 특수 이펙트 (카드 내부에 직접 부착)
    if (type === 'lightning' || type === 'mc-wave') {
        const vfx = document.createElement('div');
        vfx.className = (type === 'lightning') ? 'lightning-bolt' : 'mind-control-wave';
        el.appendChild(vfx);
        setTimeout(() => vfx.remove(), 1000);

    // [기존] 이모지 기반 이펙트 (화면 좌표 기준 body에 부착)
        const rect = el.getBoundingClientRect();

        const centerY = rect.top + rect.height / 2;

        const vfx = document.createElement('div');
        vfx.className = 'vfx-layer';
        // 좌표를 직접 지정 (화면 기준 절대 좌표)

        case 'heal': vfx.innerText = '✨'; vfx.style.animation = 'vfx-heal 0.8s ease-out forwards'; break;

        case 'rock': vfx.innerText = '🌑'; vfx.style.animation = 'vfx-boom 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1) forwards'; vfx.style.color = '#795548'; break;
        case 'magic': vfx.innerText = '🌀'; vfx.style.animation = 'vfx-magic 0.7s ease-out forwards'; break;

        case 'vortex': vfx.innerText = '⚫'; vfx.style.animation = 'vfx-magic 1.0s ease-out forwards'; vfx.style.color = '#000'; vfx.style.fontSize = '120px'; vfx.style.filter = 'blur(2px)'; break;

        // [New] 독: 독가스 (녹색 안개) - 확산(boom) 적용

    // [Phase 1] 투사체 발사 애니메이션 (속성별 궤적 적용)
    // [개선] 투사체 발사 - 스킬 등급별 크기/속도 차별화
    fireProjectile: function(atk, def, icon, skillIdx = 0) {
    return new Promise(resolve => {
        const startId = atk.team === 0 ? `p-card-${atk.id}` : `e-card-${atk.id}`;
        const endId = def.team === 0 ? `p-card-${def.id}` : `e-card-${def.id}`;
        const sEl = document.getElementById(startId);
        const eEl = document.getElementById(endId);

        if (!sEl || !eEl) { resolve(); return; }

        const sRect = sEl.getBoundingClientRect();
        const eRect = eEl.getBoundingClientRect();

        // [개선] 속성별 비행 속도 차별화 (ms) + 배속 적용
        let flightDuration = 250; 
        const base = atk.base;
        
        if (base === 'Metal' || base === 'Light') flightDuration = 180;
        else if (base === 'Fire' || base === 'Water' || base === 'Dark') flightDuration = 220;
        else flightDuration = 300;

        if (typeof Game !== 'undefined') flightDuration *= Game.speedMultiplier;
        
        // [개선] 스킬 등급별 크기 및 이펙트
        let projectileSize = 24; // 기본 (평타)
        let glowEffect = '';
        
        if (skillIdx === 1) {
            projectileSize = 32; // S1: 1.33배
            glowEffect = 'filter: drop-shadow(0 0 8px rgba(255, 223, 0, 0.6));';
        } else if (skillIdx === 2) {
            projectileSize = 40; // S2: 1.67배  
            glowEffect = 'filter: drop-shadow(0 0 12px rgba(255, 152, 0, 0.8));';
        }

        // [Phase 1] 속성별 궤적 타입 결정
        let trajectoryClass = 'trajectory-straight';
        
        if (base === 'Fire') trajectoryClass = 'trajectory-arc'; // 불: 포물선
        else if (base === 'Water') trajectoryClass = 'trajectory-wave'; // 물: 물결
        else if (base === 'Tree') trajectoryClass = 'trajectory-spin'; // 나무: 회전
        // [Fix] 흙(Earth)을 직선 궤적(Light와 동일)으로 변경하여 부드럽게 처리
        else if (base === 'Metal' || base === 'Normal' || base === 'Earth' || base === 'Light' || base === 'Dark') trajectoryClass = 'trajectory-straight';

        const p = document.createElement('div');
        p.className = `projectile ${trajectoryClass}`;
        p.innerText = icon;
        p.style.fontSize = `${projectileSize}px`;
        p.style.cssText += glowEffect;
        
        // [Patch v19.14] 배속 적용: CSS 트랜지션 속도 동기화
        if (typeof Game !== 'undefined') {
            const dur = (flightDuration / 1000) + 's';
            p.style.transitionDuration = dur;
            p.style.animationDuration = dur;
        }

        p.style.left = (sRect.left + sRect.width/2) + 'px';
        p.style.top = (sRect.top + sRect.height/2) + 'px';

        document.body.appendChild(p);

        // [Patch] 강제 리플로우(Reflow): 브라우저가 시작 위치를 인식하도록 강제함 (순간이동 방지)
        void p.offsetWidth; 

        requestAnimationFrame(() => {
            p.style.left = (eRect.left + eRect.width/2) + 'px';
            p.style.top = (eRect.top + eRect.height/2) + 'px';
        });

        setTimeout(() => {
            p.remove();
            
            // [개선] 스킬 등급별 임팩트 지속 시간
            let impactDuration = 300; // 기본 (평타)
            if (skillIdx === 1) impactDuration = 400; // S1
            else if (skillIdx === 2) impactDuration = 500; // S2
            
            // [Phase 1] 속성별 임팩트 이펙트
            const boom = document.createElement('div');
            boom.className = 'impact-effect';
            
            // 속성별 임팩트 아이콘 결정
            let impactIcon = '💥';
            let impactClass = '';

            // [Fix] 특수 속성 타격 이펙트 (얼음, 빛, 전기)
            if (atk.base === 'Water' && atk.extra === 'Dark') {
                if (skillIdx === 1) impactIcon = '💥'; 
                else if (skillIdx === 2) { impactIcon = '❄️'; impactClass = 'impact-water'; }
            } 
            else if (atk.base === 'Light') {
                // Light S1 타격 시 '빛의 폭발' (노란색 보정)
                if (skillIdx === 1) { impactIcon = '💥'; impactClass = 'impact-light-hit'; }
            }
            else if (atk.base === 'Metal' && atk.extra === 'Dark') { impactIcon = '⚡'; } // 전기 타격

            // [Fix] 기본 속성 타격 아이콘 일치화
            else if (base === 'Tree') impactIcon = '🍃';
            else if (base === 'Earth') impactIcon = '🌑';
            else if (base === 'Water' && !atk.extra) { impactIcon = '💧'; impactClass = 'impact-water'; }
            else if (base === 'Metal' && !atk.extra) impactIcon = '⚔️';

    hitStop: function(damage = 0, isAOE = false, isFirstHit = true, isKill = false) {
        // 약한 공격은 스킵 (50 이하)
        if (damage < 50) return;
        
        // 광역 공격의 2타 이후는 스킵 (킬 제외)
        if (isAOE && !isFirstHit && !isKill) return;
        
        // 데미지에 비례한 히트스톱 시간 계산
        let duration = 100; // 기본값
        
        if (isKill) {
            duration = 250; // 킬 확정은 최대
        } else if (damage >= 500) {
            duration = 250; // 치명타급
        } else if (damage >= 300) {
            duration = 200; // 강한 공격
        } else if (damage >= 100) {
            duration = 150; // 중간 공격
        } else {
            duration = 100; // 약한 공격
        }
        
        document.body.classList.add('hit-stopped');
        setTimeout(() => {
            document.body.classList.remove('hit-stopped');
        }, duration);

// ==========================================
const PredictionEngine = {
    // 다음 N턴 내 사망 위험 예측
    predictDeath: function(unit, turnsAhead = 2) {
        if (!unit || unit.isDead) return false;
        
        try {
            // 현재 큐에서 다음 N개의 턴 가져오기
            const currentIdx = Game.curr;
            const futureActions = [];
            
            for (let i = 1; i <= turnsAhead && i < 6; i++) {
                const nextIdx = (currentIdx + i) % 6;
                futureActions.push(Game.queue[nextIdx]);
            }
            
            // 적 공격자만 필터링
            let totalPredictedDamage = 0;
            futureActions.forEach(tVal => {
                const attacker = tVal % 2 === 0 ? Game.pTeam[Math.floor(tVal / 2)] : Game.eTeam[Math.floor((tVal - 1) / 2)];
                
                if (!attacker || attacker.isDead || attacker.team === unit.team) return;
                
                // 예상 피해량 계산 (보수적 추정: 1.5배)
                const baseDmg = attacker.getAtk() * 1.5;
                const aff = Game.calc(attacker, unit);
                totalPredictedDamage += baseDmg * aff.v;
            });
            
            // 현재 HP + 쉴드로 버틸 수 있는지 판단
            return (unit.hp + unit.shield) < totalPredictedDamage;
            
        } catch (e) {
            console.warn('[PredictionEngine] Error:', e);
            return false;
        }
    },
    
    // 특정 유닛의 다음 턴까지 거리 계산
    getTurnsUntilAction: function(unit) {
        if (!unit || unit.isDead) return 999;
        
        try {
            const unitQueueVal = unit.team === 0 ? unit.id * 2 : unit.id * 2 + 1;
            const currentIdx = Game.curr;
            
            for (let i = 1; i < 6; i++) {
                const checkIdx = (currentIdx + i) % 6;
                if (Game.queue[checkIdx] === unitQueueVal) {
                    return i;
                }
            }
            return 6;
        } catch (e) {
            return 999;
        }
    },
    
    // 다음 N턴 내에 행동할 적 힐러 찾기
    findUpcomingEnemyHealer: function(myTeam, turnsAhead = 3) {
        try {
            const enemies = myTeam === 0 ? Game.eTeam : Game.pTeam;
            const currentIdx = Game.curr;
            
            for (let i = 1; i <= turnsAhead && i < 6; i++) {
                const nextIdx = (currentIdx + i) % 6;
                const tVal = Game.queue[nextIdx];
                const nextUnit = tVal % 2 === 0 ? Game.pTeam[Math.floor(tVal / 2)] : Game.eTeam[Math.floor((tVal - 1) / 2)];
                
                if (!nextUnit || nextUnit.isDead || nextUnit.team === myTeam) continue;
                
                const key = nextUnit.getKey();
                if (SKILL_DB[key] && SKILL_DB[key].role === 'supp') {
                    return { unit: nextUnit, turnsAway: i };
                }
            }
            return null;
        } catch (e) {
            return null;
        }
    }
};

// 🔮 [NEW] 전투 상황 분석기 (Combat Analyzer)
// ==========================================
const CombatAnalyzer = {
    // 현재 전황 종합 평가
    evaluateSituation: function(aiTeam) {
        try {
            const allies = aiTeam === 0 ? Game.pTeam : Game.eTeam;
            const enemies = aiTeam === 0 ? Game.eTeam : Game.pTeam;
            
            const allyHP = allies.reduce((sum, u) => sum + (u.isDead ? 0 : u.hp), 0);
            const enemyHP = enemies.reduce((sum, u) => sum + (u.isDead ? 0 : u.hp), 0);
            
            const aliveAllies = allies.filter(u => !u.isDead).length;
            const aliveEnemies = enemies.filter(u => !u.isDead).length;
            
            return {
                phase: this.getPhase(),
                advantage: enemyHP > 0 ? (allyHP / enemyHP) : 2.0,
                urgency: this.calculateUrgency(allies, enemies),
                aliveAllies: aliveAllies,
                aliveEnemies: aliveEnemies,
                winCondition: this.determineWinCondition(allyHP, enemyHP, aliveAllies, aliveEnemies)
            };
        } catch (e) {
            console.warn('[CombatAnalyzer] Error:', e);
            return { phase: 'MID', advantage: 1.0, urgency: 0, winCondition: 'TRADE' };
        }
    },
    
    // 전투 단계 구분
    getPhase: function() {
        const round = Game.globalRound || Math.ceil(Game.turnCount / 6);
        const totalAlive = [...Game.pTeam, ...Game.eTeam].filter(u => !u.isDead).length;
        
        if (round <= 2) return 'EARLY';           // 초반: 자원 아끼기
        if (totalAlive <= 2) return 'DESPERATE';  // 1:1 or 2:1: 필사적
        if (round >= 10) return 'FATIGUE';        // 장기전: 힐러 의존
        return 'MID';                             // 중반: 일반
    },
    
    // 긴급도 계산
    calculateUrgency: function(allies, enemies) {
        let urgency = 0;
        
        // 아군 위험 상태 체크
        const criticalAllies = allies.filter(u => !u.isDead && u.hp < u.maxHp * 0.3).length;
        urgency += criticalAllies * 30;
        
        // 적 위협도 체크
        const enemyNukers = enemies.filter(u => {
            if (u.isDead) return false;
            const key = u.getKey();
            return SKILL_DB[key] && SKILL_DB[key].role === 'nuker';
        }).length;
        urgency += enemyNukers * 20;
        
        // 적 힐러 존재 시 긴급도 증가
        const enemyHealers = enemies.filter(u => {
            if (u.isDead) return false;
            const key = u.getKey();
            return SKILL_DB[key] && SKILL_DB[key].role === 'supp';
        }).length;
        urgency += enemyHealers * 15;
        
        return urgency;
    },
    
    // 승리 조건 판단
    determineWinCondition: function(allyHP, enemyHP, aliveAllies, aliveEnemies) {
        const advantage = enemyHP > 0 ? (allyHP / enemyHP) : 2.0;
        
        if (advantage > 1.5 && aliveAllies > aliveEnemies) {
            return 'SWEEP';  // 압도: 빠르게 밀어붙이기
        } else if (advantage < 0.7 || aliveAllies < aliveEnemies) {
            return 'STALL';  // 열세: 버티면서 역전 노리기
        } else {
            return 'TRADE';  // 균형: 효율적 교환전
        }
    },
    
    // 조합 분석
    analyzeComposition: function(team) {
        const composition = { healers: 0, tanks: 0, nukers: 0 };
        
        team.forEach(u => {
            if (u.isDead) return;
            const key = u.getKey();
            if (!SKILL_DB[key]) return;
            
            const role = SKILL_DB[key].role;
            if (role === 'supp') composition.healers++;
            else if (role === 'tank') composition.tanks++;
            else if (role === 'nuker') composition.nukers++;
        });
        
        return composition;
    }
};
