            // [Fix] 나무(Tree) S2는 아군 회복 스킬이므로 강제 변경
            if (k === 'Tree') targetType = 'ALLY';

    highlightTargets: function(targetType, actingUnit) {
    // 1. 행동 유닛 확정
    if (!actingUnit) {
        if (this.isMindControlling) {
            actingUnit = this.isMindControlling;
        } else {
            const tVal = this.queue[this.curr];
            actingUnit = tVal % 2 === 0 ? this.pTeam[Math.floor(tVal / 2)] : this.eTeam[Math.floor((tVal - 1) / 2)];
        }
    }

    // 2. 기존 타겟팅 초기화
    document.querySelectorAll('.unit').forEach(el => {
        el.classList.remove('target-enemy', 'target-ally', 'target-aoe');
        el.onclick = null;
    });

    // 3. 스킬 타입 분류
    const SUPPORT_TYPES = ['ALLY', 'ALL_ALLY', 'SELF', 'SELF_BUFF', 'TARGET_BUFF', 'HEAL', 'BUFF'];
    const isSupportSkill = SUPPORT_TYPES.includes(targetType);
    const isAOE = ['ALL_ENEMY', 'ALL_ALLY', 'AOE'].includes(targetType);
    const isSelfOnly = ['SELF', 'SELF_BUFF'].includes(targetType);

    // 4. 팀 정의 (원래 소속 기준)
    const originalAllies = actingUnit.team === 0 ? this.pTeam : this.eTeam;
    const originalEnemies = actingUnit.team === 0 ? this.eTeam : this.pTeam;

    let finalTargets = [];

    // 5. 세뇌 여부에 따른 타겟 결정
    const isMindControlled = this.isMindControlling && actingUnit.id === this.isMindControlling.id;
    
    if (isSelfOnly) {
        // 자가 버프는 언제나 자신에게만
        finalTargets = [actingUnit];
    } 
    else if (isMindControlled) {
        // [세뇌 상태] - 피아식별 역전
        if (isSupportSkill) {
            // 힐/버프 -> 적군(현재 나를 조종하는 팀)에게 사용
            finalTargets = originalEnemies.filter(u => !u.isDead);
        } else {
            // 공격 -> 아군(나의 원래 동료)을 공격
            // [개선] 자해(Self Attack)도 가능하도록 자신을 포함
            finalTargets = originalAllies.filter(u => !u.isDead);
            // 자해 가능하도록 자신도 포함 (중복 방지 체크)
            if (!finalTargets.some(t => t.id === actingUnit.id)) {
                finalTargets.push(actingUnit);
            }
        }
    } else {
        // [정상 상태]
        if (isSupportSkill) {
            finalTargets = originalAllies.filter(u => !u.isDead);
        } else {
            // 적군 + "세뇌당해서 배신자가 된 아군"도 공격 가능해야 함
            const realEnemies = originalEnemies.filter(u => !u.isDead);
            const traitors = originalAllies.filter(u => !u.isDead && (u.hasStatus('MC_WAIT') || u.hasStatus('MC_READY')));
            finalTargets = [...realEnemies, ...traitors];
        }
    }

    // 6. Tree-Dark 예외 처리
    if (actingUnit.getKey() === 'Tree-Dark' && this.selectedSkillIdx === 2) {
        // 영혼결속은 자신 제외 (단, 세뇌 상태에서 혼자 남은 경우는 자해 가능)
        if (!isMindControlled || finalTargets.length > 1) {
            finalTargets = finalTargets.filter(t => t.id !== actingUnit.id);
        }
    }

    // 7. 타겟 렌더링
    let targetClass = isSupportSkill ? 'target-ally' : 'target-enemy';
    if (isAOE && !isSupportSkill) targetClass = 'target-aoe';

    let targetCount = 0;

    finalTargets.forEach((t) => {
        const cardId = t.team === 0 ? `p-card-${t.id}` : `e-card-${t.id}`;
        const el = document.getElementById(cardId);
        
        if (el) {
            el.classList.add(targetClass);
            el.onclick = () => {
                if (Game.isProcessing) return;
                Game.isProcessing = true;
                
                // 입력 잠금
                this.noInput();
                document.querySelectorAll('.unit').forEach(e => {
                    e.classList.remove('target-enemy', 'target-ally', 'target-aoe');
                });
                
                // 실행
                this.execute(actingUnit, t, this.selectedSkillIdx);
            };
            targetCount++;
        }
    });

// 8. 디버깅 및 예외 처리 (Option 2 적용)
    if (targetCount === 0) {
        console.warn('⚠️ No valid targets:', {
            skillIdx: this.selectedSkillIdx,
            targetType: targetType,
            actingUnit: actingUnit.name,
            isMindControlled: isMindControlled,
            finalTargets: finalTargets.map(t => t.name)
        });

        // 타겟이 없는 경우 UI 피드백
        if (isMindControlled && !isSupportSkill) {
            UI.floatText(actingUnit, "대상없음", "ft-miss");
            this.log(`<span class='log-sys'>⚠️ [${actingUnit.name}] 공격할 수 있는 대상이 없습니다.</span>`);
        } else if (!isMindControlled && finalTargets.length === 0) {
            console.error('🚨 Critical: No targets found in normal state!');
            UI.floatText(actingUnit, "타겟오류", "ft-miss");
            this.log(`<span class='log-sys'>🚨 [${actingUnit.name}] 타겟팅 오류 발생</span>`);
        }
        
        // ✅ 스킬 선택 초기화 추가 (버그 수정)
        this.selectedSkillIdx = -1;
        document.querySelectorAll('.skill-btn').forEach(b => b.classList.remove('selected'));
        return; // 함수 종료
    }
}, // 콤마 필수 (뒤에 ai 함수가 있음)


    // ========== 3997번째 줄부터 교체 ==========
    
ai: function(u) {
        // [검증] 온라인, 로컬 PVP면 AI 작동 중지
        if (isOnlineMode || this.difficulty === 'local' || this.difficulty === 'pvp') return;
        // [레이드] 보스는 bossAct()로 처리
        if (this.difficulty === 'raid' && u && u.isBoss) return;
        
        // 0. 기본 검증
        if (!u || u.isDead) {
            this.endTurn(true);
            return;
        }

        try {
            this.log(`<span class='log-sys'>🤖 AI 행동 중: ${u.name}</span>`);

            // 1. 세뇌 판정
            const isBrainwashed = (this.isMindControlling && this.isMindControlling.id === u.id);
            if (isBrainwashed) {
                this.log(`<span class='log-crit'>🧠 [${u.name}] 세뇌 상태로 행동!</span>`);
            }

            // 2. 적/아군 식별
            let enemies, allies;
            if (isBrainwashed) {
                enemies = u.team === 0 ? this.pTeam : this.eTeam; // 원래 팀이 적
                allies = u.team === 0 ? this.eTeam : this.pTeam;
            } else {
                enemies = u.team === 0 ? this.eTeam : this.pTeam; // 상대 팀이 적
                allies = u.team === 0 ? this.pTeam : this.eTeam;
            }

            // 3. 생존자 필터링
            let aliveEnemies = enemies.filter(e => !e.isDead && e.id !== u.id);
            const aliveAllies = allies.filter(a => !a.isDead);

            // [예외] 세뇌 상태인데 공격 대상 전멸 시 자해 허용
            if (aliveEnemies.length === 0 && isBrainwashed) {
                aliveEnemies = [u];
            }

            if (aliveEnemies.length === 0) {
                this.endTurn();
                return;
            }

            // 4. 도발(Taunt) 처리
            if (!isBrainwashed) {
                const provoked = u.status.find(st => st.type.startsWith('PROVOKED_BY_'));
                if (provoked) {
                    const targetId = parseInt(provoked.type.split('_')[2]);
                    const taunter = aliveEnemies.find(t => t.id === targetId);
                    if (taunter) {
                        this.execute(u, taunter, 0); // 평타 강제
                        return;
                    }
                }
            }

            const silenced = u.hasStatus('SILENCE');
            const k = u.getKey();
            const sk = SKILL_DB[k];

            // ---------------------------------------------------------
            // 🧠 [NEW] 난이도 설정
            // ---------------------------------------------------------
            const difficultyMultiplier = {
                'easy': 0.7,
                'normal': 1.0,
                'hard': 1.3,
                'hell': 1.5
            }[this.difficulty] || 1.0;

            const randomnessFactor = {
                'easy': 30,      // 높은 무작위성
                'normal': 10,    // 중간
                'hard': 5,       // 낮은 무작위성
                'hell': 2        // 거의 최적
            }[this.difficulty] || 10;

            // ---------------------------------------------------------
            // 🧠 [NEW] 조합 분석 (어려움 이상)
            // ---------------------------------------------------------
            let enemyComposition = { healers: 0, tanks: 0, nukers: 0 };
            if (this.difficulty === 'hard' || this.difficulty === 'hell') {
                aliveEnemies.forEach(e => {
                    const eKey = e.getKey();
                    if (SKILL_DB[eKey]) {
                        const role = SKILL_DB[eKey].role;
                        if (role === 'supp') enemyComposition.healers++;
                        else if (role === 'tank') enemyComposition.tanks++;
                        else if (role === 'nuker') enemyComposition.nukers++;
                    }
                });
            }

            // ---------------------------------------------------------
            // 🧠 [AI Core] 헬퍼 함수 정의
            // ---------------------------------------------------------

            const isAttackSkill = (desc, type) => {
                if (!desc) return false;
                
                const hasAttackKeyword = desc.includes('배') || desc.includes('도발') || desc.includes('속박');
                const hasHealKeyword = desc.includes('힐') || desc.includes('회복') || desc.includes('HP+');
                
                if (hasHealKeyword) return false;
                if (desc.includes('쉴드') && hasAttackKeyword) return true;
                if (desc.includes('쉴드') && !hasAttackKeyword) return false;
                if (hasAttackKeyword) return true;
                if (['CC', 'DEBUFF', 'AOE', 'NUKE_PER', 'ATK'].includes(type)) return true;
                
                return false;
            };

            const isSupportSkill = (desc, type) => {
                if (!desc) return false;
                if (desc.includes('배') && !desc.includes('힐') && !desc.includes('회복')) return false;
                if (desc.includes('도발') || desc.includes('속박')) return false;
                if (['CC', 'DEBUFF', 'AOE', 'NUKE_PER'].includes(type)) return false;

                        // [Fix #4] 혼자 남아 HP 높으면 평타 기피 (지연 방지)
                        if (isAlone && u.hp > u.maxHp * 0.65 && (u.s2Count || 0) < 5) {
                            score -= 5000; // S2 폭주 먼저 쓰도록 유도
                        }
                    }
                }

                return score * difficultyMultiplier;
            };

            // ---------------------------------------------------------
            // 🚀 행동 목록 생성 및 선택
            // ---------------------------------------------------------
            let actions = [];

            // A. 공격 행동 수집
            aliveEnemies.forEach(e => {
                actions.push({ idx: 0, target: e, score: getAttackScore(e, 0), type: 'attack' });
                if (!silenced) {
                    [1, 2].forEach(i => {
                        const desc = i===1 ? sk.s1d : sk.s2d;
                        if (isAttackSkill(desc, sk.type)) {
                            if (k === 'Tree-Dark' && i === 2) return; 
                            actions.push({ idx: i, target: e, score: getAttackScore(e, i), type: 'attack' });
                        }
                    });
                }
            });

            // B. 지원 행동 수집
            if (!silenced) {
                aliveAllies.forEach(a => {
                    [1, 2].forEach(i => {
                        const desc = i===1 ? sk.s1d : sk.s2d;
                        if (isSupportSkill(desc, sk.type)) {
                            if ((sk.type === 'SELF_BUFF' || sk.type === 'SELF') && a.id !== u.id) return;
                            if (k === 'Tree-Dark' && i === 2 && a.id === u.id) return; 
                            actions.push({ idx: i, target: a, score: getSupportScore(a, i), type: 'support' });
                        }
                    });
                });
            }
            
            // [NEW] 상황 분석 기반 점수 조정
            const situation = CombatAnalyzer.evaluateSituation(u.team);
            
            actions.forEach(action => {
                // 필사적 상황: 수비 행동 우선
                if (situation.phase === 'DESPERATE' && situation.winCondition === 'STALL') {
                    if (action.type === 'support') {
                        action.score *= 1.5; // 수비 행동 50% 가중
                    }
                }
                
                // 압도 상황: 공격 행동 우선
                if (situation.phase === 'EARLY' && situation.winCondition === 'SWEEP') {
                    if (action.type === 'attack' && action.idx > 0) {
                        action.score *= 1.3; // 공격 스킬 30% 가중
                    }
                }
                
                // 긴급 상황: 힐/쉴드 최우선
                if (situation.urgency > 50) {
                    if (action.type === 'support') {
                        action.score *= (1 + situation.urgency / 100);
                    }
                }
            });

            // 디버그 로그 (개선)
            if (typeof DEBUG !== 'undefined' && DEBUG.enabled) {
                console.groupCollapsed(`🤖 [${u.name}] 행동 선택 (난이도: ${this.difficulty})`);
                console.log(`상황: ${situation.phase}, 승리조건: ${situation.winCondition}, 긴급도: ${situation.urgency}`);
                console.log(`침묵 상태: ${silenced ? 'YES' : 'NO'}`);
                const debugActions = [...actions].sort((a, b) => b.score - a.score);
                console.log('=== 상위 5개 선택지 ===');
                debugActions.slice(0, 5).forEach((a, i) => {
                    const skillName = a.idx === 0 ? '평타' : (a.idx === 1 ? 'S1' : 'S2');
                    const targetInfo = `${a.target.name} (HP: ${a.target.hp}/${a.target.maxHp})`;
                    console.log(`${i+1}. ${skillName} → ${targetInfo} | 점수: ${a.score.toFixed(0)}`);
                });
                console.groupEnd();
            }

            // C. 최적 행동 선택 (난이도별 무작위성 적용)
            actions.sort((a, b) => (b.score + Math.random()*randomnessFactor) - (a.score + Math.random()*randomnessFactor));
            let best = actions[0];

            // [개선] Fallback 로직: 극단적으로 나쁜 선택만 리셋
            if (!best || !best.target || best.score < -20000) {
                // 침묵 상태가 아니면 스킬 중에서 선택
                if (!silenced && actions.length > 1) {
                    const skillActions = actions.filter(a => a.idx > 0);
                    if (skillActions.length > 0) {
                        best = skillActions[0]; // 가장 점수 높은 스킬
                    } else {
                        best = { 
                            idx: 0, 
                            target: aliveEnemies[Math.floor(this.netRandom() * aliveEnemies.length)],
                            type: 'attack'
                        };
                    }
                } else {
                    best = { 
                        idx: 0, 
                        target: aliveEnemies[Math.floor(this.netRandom() * aliveEnemies.length)],
                        type: 'attack'
                    };
                }
            }

            if (!isBrainwashed && best.target && best.target.team === u.team) {
                const info = best.idx === 0 ? "평타" : (best.idx === 1 ? sk.s1d : sk.s2d);
                if (best.type === 'attack' || (info && info.includes('배') && sk.type !== 'HEAL')) {
                    best.target = aliveEnemies[Math.floor(this.netRandom() * aliveEnemies.length)];
                    best.idx = 0;
                }
            }

            this.execute(u, best.target, best.idx);

        } catch (e) {
            console.error("AI Logic Critical Error:", e);
            this.endTurn(); 
        }
    },

    die: function(u) {
        if (u.isDead) return;
        u.isDead = true;
        u.hp = 0;
        
        // [Fix] 즉각적인 시각적 피드백 (죽은 눈)
        const cardId = u.team === 0 ? `p-card-${u.id}` : `e-card-${u.id}`;
        const el = document.getElementById(cardId);
        if (el) el.classList.add('dead');

        // [Patch v19.06] 예외 처리 강화: 시전자 사망 시 모든 세뇌 관련 상태 강제 정화
        const allUnits = [...Game.pTeam, ...Game.eTeam];
        allUnits.forEach(target => {
            // 1. 대기 중인 세뇌(MC_WAIT) 해제
            const wait = target.status.find(s => s.type === 'MC_WAIT');
            if (wait && wait.sourceId === u.id) {
                target.status = target.status.filter(s => s.type !== 'MC_WAIT');
                Game.log(`<span class='log-sys'>🕊️ 시전자([${u.name}]) 사망으로 [${target.name}]의 세뇌 예약이 취소되었습니다.</span>`);
                UI.floatText(target, "예약 취소", "ft-miss");
            }
            
            // 2. 조종 준비 완료(MC_READY) 해제 (혹시 남아있을 경우)
            const ready = target.status.find(s => s.type === 'MC_READY');
            if (ready && ready.sourceId === u.id) {
                target.status = target.status.filter(s => s.type !== 'MC_READY');
            }
        });

        // 3. 현재 실시간 조종 중인 경우 제어권 반환
        if (this.isMindControlling && this.currentMCCasterId === u.id) {
             const puppet = this.isMindControlling;
             
             // 세뇌 상태 태그 정리
             puppet.status = puppet.status.filter(s => s.type !== 'MC_READY' && s.type !== 'MC_WAIT');
             
             this.isMindControlling = null;
             this.currentMCCasterId = null;
             
             Game.log(`<span class='log-sys'>🕊️ 시전자 사망! [${puppet.name}]의 정신 지배가 즉시 풀립니다.</span>`);
             UI.floatText(puppet, "지배 해제", "ft-heal");
             
             // UI 테두리 색상 복구
             const cp = document.querySelector('.control-panel');
             if(cp) cp.style.borderTop = "5px solid #ff80ab"; // 기본 핑크색 복구
        }
		
        u.status = [];
        Game.log(`${u.name} 탈락`);
        if (u.base === 'Tree' && u.extra === 'Dark') {
            Game.log(`🥀 [${u.name}] 최후의 저주! (광역 독)`);
            const enemies = u.team === 0 ? Game.eTeam : Game.pTeam;
            enemies.forEach(e => {
                // [Fix] turn=2: 공격자의 endTurn decayStatus(1→0 즉시소멸) 방지
                // 공격자: 2→1 (endTurn 감소) → 다음 턴 tick → 1→0 소멸 (1회 피해 정상처리)
                // 다른 적: 2→1 (본인 endTurn 감소) → 다음 턴 tick → 1→0 (동일 1회 처리)
                if (!e.isDead) e.addStatus('POISON', 2, 0, u);
            });
        }
        const allies = u.team === 0 ? Game.pTeam : Game.eTeam;
        const thorns = allies.filter(a => a.base === 'Tree' && a.extra === 'Dark' && !a.isDead && a.linkedAllyId === u.id);
        thorns.forEach(thorn => {
            thorn.revengeAtk += 20;
            thorn.thornStack += 0.3;
            thorn.linkedAllyId = -1;
            Game.log(`🌵 [${thorn.name}] 복수 발동! (공격력+20, S1계수+0.3)`);
            UI.floatText(thorn, "🌵복수발동!", "ft-crit");
        });
    },

                                <div style="background:rgba(255,255,255,0.08); border-radius:10px; padding:8px; margin-bottom:10px; text-align:left;">
                                    <div style="color:#80cbc4; font-size:11px; font-weight:bold; margin-bottom:4px;">🧬 생존 팀원</div>
                                    ${teamSummary || '<div style="color:#aaa;font-size:11px;">전원 사망 (아슬아슬 클리어!)</div>'}
                                </div>
                                <div style="color:#ffd54f; font-size:13px; margin-bottom:10px;">총 누적 딜: ${totalDmg.toLocaleString()}</div>
                                <button onclick="Game.reset()" style="padding:10px 24px; background:linear-gradient(135deg,#4caf50,#00897b); color:white; border:none; border-radius:10px; font-size:15px; cursor:pointer;">🏠 돌아가기</button>

                                    ${teamSummary || '<div style="color:#ff8a80;font-size:11px;">⚠️ 생존자 없음 — 마지막 격파!</div>'}
                                </div>
                                <div style="text-align:center; padding:10px; background:rgba(124,77,255,0.15); border-radius:10px; border:1px solid #7c4dff;">
                                    <p style="font-size:22px; margin:0 0 4px;">${nextBoss.emoji}</p>

                                </div>
                            </div>`
                        );

                return true;
            }

            // [신규] 튜토리얼 승리/패배 처리 (start() 재호출로 연결)
            if (this.difficulty === 'tutorial') {
                if (pd) { // 패배
                    UI.showModal("Defeat... 😢", 
                        `<p>괜찮습니다. 다시 도전해보세요!</p>
                         <button onclick="Game.start()" 
                         style="padding:10px 20px; background:#ff7043; color:white; border:none; border-radius:10px; font-size:16px; cursor:pointer;">
                         재도전 🔄
                         </button>`
                    );
                } else { // 승리
                     UI.showModal("Victory! 🎓", 
                        `<p>훌륭합니다! 핵심 전략을 이해하셨군요.</p>
                         <button onclick="Game.tStage++; Game.start();" 
                         style="padding:10px 20px; background:#4caf50; color:white; border:none; border-radius:10px; font-size:16px; cursor:pointer;">

                this.challengeStage++;
                let msg = `🏆 스테이지 ${this.challengeStage} 클리어!`;
                if (this.challengeStage >= ChallengeDB.length) msg = "🎉 모든 챌린지를 정복했습니다! 축하합니다!";
                localStorage.setItem('et_challenge_stage', this.challengeStage);
                UI.showResult(msg);
            } else {
                UI.showResult(pd ? "🧡 적군 (Team 2)" : "💙 아군 (Team 1)");
            }
            localStorage.removeItem('et_save_v6');
            return true;
        }
        return false;
    },
    log: function(m) {
        const b = document.getElementById('logs');
        const d = document.createElement('div');
        d.className = 'log-entry';
        d.innerHTML = m;
        b.appendChild(d);
        
        // 🟢 [최적화] 로그가 50개를 넘으면 가장 오래된 것부터 삭제 (DOM 누적 방지)
        while (b.children.length > 50) {
            b.removeChild(b.firstChild);
        }
        
        b.scrollTop = b.scrollHeight;
    },
    shake: function(u) {
        const id = u.team === 0 ? `p-card-${u.id}` : `e-card-${u.id}`;
        const el = document.getElementById(id);
        if (el) {
            el.classList.remove('shake');
            void el.offsetWidth;
            el.classList.add('shake');
        }
    },
    saveGame: function() {
        if (this.isOver) {
            alert("게임이 끝난 상태는 저장할 수 없습니다.");
            return;
        }
        if (this.difficulty === 'raid') {
            alert("⚔️ 레이드 모드는 중간 저장이 지원되지 않습니다.\n보스를 모두 격파하거나 귀환 후 이용해주세요.");
            return;
        }
        const saveData = {
            pTeam: this.pTeam.map(u => this.serializeUnit(u)),
            eTeam: this.eTeam.map(u => this.serializeUnit(u)),
            queue: this.queue,
            curr: this.curr,
            turnCount: this.turnCount,
            globalRound: this.globalRound || 1, // [Fix] 데스매치 라운드 카운터 저장
            difficulty: this.difficulty,
            mode: this.mode,
            selected: this.selected,
            // [Fix] 세뇌 데이터 저장 추가
            mcCasterId: this.currentMCCasterId || null,
            mcTargetId: this.isMindControlling ? this.isMindControlling.id : null
        };
        const saveDataWithVersion = {
            ...saveData,
            version: GAME_CONFIG.SAVE_VERSION,
            schemaVersion: GAME_CONFIG.SCHEMA_VERSION,
            timestamp: Date.now()
        };
        localStorage.setItem('et_save_' + GAME_CONFIG.SAVE_VERSION, JSON.stringify(saveDataWithVersion));
        UI.floatText(this.pTeam[0], "게임 저장됨!", "ft-heal");
        this.log("<span class='log-sys'>💾 게임 진행 상황이 저장되었습니다.</span>");
    },
    loadGame: function() {
        const json = localStorage.getItem('et_save_' + GAME_CONFIG.SAVE_VERSION);
        const savedStage = localStorage.getItem('et_challenge_stage');
        if (savedStage) this.challengeStage = parseInt(savedStage);
        if (!json) {
            alert(`저장된 전투가 없습니다.\n(현재 챌린지 단계: ${this.challengeStage+1})`);
            return;
        }
        try {
            const data = JSON.parse(json);
            
            // 🔒 버전 및 스키마 검증
            if (!data.version || data.version !== GAME_CONFIG.SAVE_VERSION) {
                throw new Error('버전이 호환되지 않습니다. (저장: ' + (data.version || '알 수 없음') + ', 현재: ' + GAME_CONFIG.SAVE_VERSION + ')');
            }
            if (!data.schemaVersion || data.schemaVersion < GAME_CONFIG.SCHEMA_VERSION) {
                console.warn('⚠️ 구버전 세이브 파일입니다. 일부 데이터가 손실될 수 있습니다.');
            }
            if (!data.pTeam || !data.eTeam) {
                throw new Error('세이브 데이터가 손상되었습니다.');
            }
            this.difficulty = data.difficulty;
            this.mode = data.mode;
            
            // [Fix] UI 셀렉트 박스도 저장된 난이도로 동기화
            const diffSelect = document.getElementById('diff-select');
            if(diffSelect) {
                diffSelect.value = this.difficulty;
                // 만약 저장된 난이도가 옵션에 없다면(구버전 등), 기본값으로 설정
                if (diffSelect.value !== this.difficulty) diffSelect.value = 'easy';
            }
            this.checkMode(); // 챌린지 모드일 경우 스테이지 정보 갱신

            this.turnCount = data.turnCount;
            this.curr = data.curr;
            this.queue = data.queue;
            this.selected = data.selected;
            this.globalRound = data.globalRound || 1; // [Fix] 데스매치 라운드 복원
            this.pTeam = data.pTeam.map(d => this.deserializeUnit(d));
            this.eTeam = data.eTeam.map(d => this.deserializeUnit(d));
            
            // [추가] 세뇌 상태 복구
            this.isMindControlling = null;
            this.currentMCCasterId = data.mcCasterId || null;
            if (data.mcTargetId !== null && data.mcTargetId !== undefined) {
                const allUnits = [...this.pTeam, ...this.eTeam];
                const puppet = allUnits.find(u => u.id === data.mcTargetId);
                if (puppet && !puppet.isDead) {
                    this.isMindControlling = puppet;
                    this.log("<span class='log-sys'>🧠 세뇌 상태를 복구했습니다.</span>");
                }
            }

            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('battle-screen').style.display = 'flex';
            document.getElementById('logs').innerHTML = '';
            this.log("<span class='log-sys'>📂 저장된 게임을 불러왔습니다.</span>");
            this.render();
            if (this.timer) clearTimeout(this.timer);
            const tVal = this.queue[this.curr];
            const u = tVal % 2 === 0 ? this.pTeam[Math.floor(tVal / 2)] : this.eTeam[Math.floor((tVal - 1) / 2)];
            if (!u) {
                alert("세이브 파일이 손상되었습니다.");
                return;
            }
            let turnName = u.name.split(' ')[0];
            if (this.mode === 'pvp') turnName += (u.team === 0 ? " (1P)" : " (2P)");
            document.getElementById('turn-indicator').innerText = `Turn ${Math.ceil(this.turnCount/6)} : ${turnName}`;
            if (u.team === 1 && this.mode !== 'pvp') {
                this.noInput();
                if (this.timer) clearTimeout(this.timer);

                this.timer = setTimeout(() => this.ai(u), 1000);
            } else {
                this.input(u);
            }
        } catch (e) {
            console.error('Save Load Error:', e);
            alert(`⚠️ 세이브 파일을 불러올 수 없습니다.\n데이터가 손상되었거나 버전이 다릅니다.\n(오류 내용: ${e.message})`);
            // 오류 발생 시 초기화하여 꼬임 방지
            localStorage.removeItem('et_save_' + GAME_CONFIG.SAVE_VERSION); // [Fix] 하드코딩 버전 제거
        }
    },
    serializeUnit: function(u) {
        return {
            id: u.id,
            team: u.team,
            base: u.base,
            extra: u.extra,
            hp: u.hp,
            maxHp: u.maxHp,
            shield: u.shield,
            atk: u.atk,
            status: u.status,
            isDead: u.isDead,
            thornStack: u.thornStack,
            linkedAllyId: u.linkedAllyId,
            s2Count: u.s2Count,
            elecStacks: u.elecStacks,
            growthStack: u.growthStack,
            stats: u.stats,
            passiveTriggered: u.passiveTriggered,
            revengeAtk: u.revengeAtk,
            isSuper: u.isSuper
        };
    },
    deserializeUnit: function(d) {
        const u = new Unit(d.id, d.team, d.base, d.extra);
        u.hp = d.hp;
        u.maxHp = d.maxHp;
        u.shield = Math.min(d.shield || 0, GAME_CONSTANTS.MAX_SHIELD);
        u.atk = d.atk;
        u.status = d.status;
        u.isDead = d.isDead;
        if (d.thornStack) u.thornStack = d.thornStack;
        if (d.linkedAllyId) u.linkedAllyId = d.linkedAllyId;
        if (d.s2Count) u.s2Count = d.s2Count;
        if (d.elecStacks) u.elecStacks = d.elecStacks;
        if (d.growthStack) u.growthStack = d.growthStack;
        if (d.stats) u.stats = d.stats;
        if (d.passiveTriggered) u.passiveTriggered = d.passiveTriggered;
        if (d.revengeAtk) u.revengeAtk = d.revengeAtk;
        if (d.isSuper) u.isSuper = d.isSuper;
        return u;
    },
    // 데미지 예측 계산기
    predictDmg: function(target) {
        if (this.selectedSkillIdx === -1 || !target) return 0;
        
        // 현재 턴을 잡은 유닛(공격자) 찾기
        let atkUnit;
        if (this.isMindControlling) {
            atkUnit = this.isMindControlling;
        } else {
            const tVal = this.queue[this.curr];
            if (tVal === undefined || tVal === null) return 0;
            atkUnit = tVal % 2 === 0 ? this.pTeam[Math.floor(tVal/2)] : this.eTeam[Math.floor((tVal-1)/2)];
        }
        if (!atkUnit || atkUnit.isDead) return 0;

        const k = atkUnit.getKey();
        const s = SKILL_DB[k];
        if (!s) return 0;
        
        let mult = 1.0;
        
        if (this.selectedSkillIdx === 0) {
            mult = 1.0;
        } else {
            const desc = this.selectedSkillIdx === 1 ? s.s1d : s.s2d;
            if (!desc) return 0;
            
            // 비공격 스킬 타입 필터링
            const nonAtkTypes = ['HEAL', 'BUFF', 'ALLY', 'ALL_ALLY', 'SELF_BUFF', 'TARGET_BUFF'];
            if (s.type && nonAtkTypes.includes(s.type)) return 0;
            if (desc.includes('힐') || desc.includes('쉴드') || desc.includes('정화')) return 0;
            
            const match = desc.match(/([\d.]+)배/);
            if (match) mult = parseFloat(match[1]);
        }

        const baseAtk = atkUnit.getAtk();
        const aff = this.calc(atkUnit, target);
        return Math.floor(baseAtk * mult * aff.v);
    },
    calc: (a, d) => {
        let v = 1.0;
        let t = '';
        
        if (a.isNormal) {
            // 노말 속성의 강타
            if (d.isNormal || d.isEnhanced) {
                v = GAME_CONSTANTS.DAMAGE_MULTIPLIER.WEAKNESS;
                t = '(강타)';
            }
        } else {
            // 속성 상성 관계
            const weaknesses = {
                'Fire': ['Metal', 'Tree'],
                'Water': ['Fire', 'Metal'],
                'Tree': ['Water', 'Earth'],
                'Metal': ['Tree', 'Earth'],
                'Earth': ['Fire', 'Water']
            };
            const enhancedWeaknesses = {
                'Light': ['Dark'],
                'Dark': ['Light']
            };
            const basicElements = ['Fire', 'Water', 'Tree', 'Metal', 'Earth'];

            if (d.isNormal) {
                // 순수 기초 5속성만 노말에게 약점 피해
                if (basicElements.includes(a.base) && !a.extra) {
                    v = GAME_CONSTANTS.DAMAGE_MULTIPLIER.WEAKNESS;
                    t = '(약점)';
                }
            } else {
                // 일반 약점 체크
                if (weaknesses[a.base]?.includes(d.base) || enhancedWeaknesses[a.base]?.includes(d.base)) {
                    v = GAME_CONSTANTS.DAMAGE_MULTIPLIER.WEAKNESS;
                    t = '(약점)';
                } 
                // 저항 체크
                else if (weaknesses[d.base]?.includes(a.base)) {
                    v = GAME_CONSTANTS.DAMAGE_MULTIPLIER.RESISTANCE;
                    t = '(저항)';
                }
            }
        }
        
        // 치명타: 약점이면서 Light vs Dark 또는 Dark vs Light
        if (v === GAME_CONSTANTS.DAMAGE_MULTIPLIER.WEAKNESS && 
            a.extra && d.extra && 
            ((a.extra === 'Light' && d.extra === 'Dark') || (a.extra === 'Dark' && d.extra === 'Light'))) {
            v = GAME_CONSTANTS.DAMAGE_MULTIPLIER.CRITICAL;
            t = '(치명타!)';
        }
        
        return { v, t };
    }
};

// 📱 [Mobile/Web] 백그라운드 진입 시 소리 차단
// ==========================================
document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
        // [숨김] 화면에서 사라지면 -> 일시 정지
        console.log("⏸️ Background detected: Pausing audio.");

        // 1. MP3 정지 (현재 재생 중이라면)
        if (MusicEngine.currentAudio && !MusicEngine.currentAudio.paused) {
            MusicEngine.currentAudio.pause();
            MusicEngine.wasPlayingBeforeHide = true; // "원래 켜져 있었음" 표시
        } else {
            MusicEngine.wasPlayingBeforeHide = false;
        }

        // 2. 효과음(AudioContext) 정지
        if (AudioSys.ctx && AudioSys.ctx.state === 'running') {
            AudioSys.ctx.suspend();
        }

    } else {
        // [복귀] 화면에 다시 나타나면 -> 재생 재개
        console.log("▶️ Foreground detected: Resuming audio.");

        // 1. MP3 재개 (원래 켜져 있었고, 음소거 상태가 아닐 때만)
        if (MusicEngine.wasPlayingBeforeHide && !AudioSys.bgmMuted) {
            if (MusicEngine.currentAudio) {
                MusicEngine.currentAudio.play().catch(e => console.log("Auto-resume blocked", e));
            } else {
                // 만약 오디오 객체가 날아갔다면 새로 재생 (Start)
                MusicEngine.play('Start');
            }
        }

        // 2. 효과음 재개
        if (AudioSys.ctx && AudioSys.ctx.state === 'suspended') {
            AudioSys.ctx.resume();
        }
    }
});
window.onload = function() {
    Game.init();

    // [이슈2 Fix] Render.com 슬립 방지 Keepalive — 4분마다 서버에 핑
    (function startKeepalive() {
        const PING_INTERVAL = 4 * 60 * 1000;
        setInterval(() => {
            fetch('/ping', { method: 'GET', cache: 'no-store' })
                .then(() => console.log('🏓 Keepalive OK'))
                .catch(() => console.warn('⚠️ Keepalive failed'));
        }, PING_INTERVAL);
    })();
};
